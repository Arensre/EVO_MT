services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: evo_mt_postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-evo_mt}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASS:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - evo_mt_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-evo_mt}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    container_name: evo_mt_backend
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-evo_mt}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASS:-postgres}
      - CORS_ORIGIN=http://localhost
    ports:
      - "3001:3001"
    networks:
      - evo_mt_network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # Frontend Web App
  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    container_name: evo_mt_frontend
    ports:
      - "80:80"
    networks:
      - evo_mt_network
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  evo_mt_network:
    driver: bridge
